<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackRock - Novo Registro</title>
    <style>
        :root {
            --bg-canvas: #0A0C12;
            --bg-card: #141721;
            --borda-nitida: #1A202C;
            --texto-high: #FFFFFF;
            --texto-med: #94A3B8;
            --gradiente-cta: linear-gradient(135deg, #EC1A7C, #4E3FEA);
            --input-bg: #1A202C;
            --input-border: #2D3748;
            --verde-sucesso: #38E090;
            --erro: #FF4B4B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-canvas); color: var(--texto-high); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-card { background: var(--bg-card); width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; border: 1px solid var(--borda-nitida); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 24px; letter-spacing: 2px; text-transform: uppercase; line-height: 1;}
        .header h1 span { background: var(--gradiente-cta); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--texto-med); margin-top: 5px; text-transform: uppercase; }
        .header p { color: var(--texto-high); font-size: 13px; margin-top: 15px; font-weight: 700; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: var(--texto-med); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
        
        .phone-wrapper { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .phone-wrapper:focus-within { border-color: #EC1A7C; box-shadow: 0 0 0 2px rgba(236, 26, 124, 0.2); }
        .prefixo { background: rgba(255,255,255,0.05); padding: 12px; font-size: 14px; font-weight: 600; color: var(--texto-high); border-right: 1px solid var(--input-border); display: flex; align-items: center; gap: 6px; }
        .phone-wrapper input { border: none; background: transparent; width: 100%; padding: 12px; color: white; font-size: 14px; outline: none; }

        /* Wrapper para o ícone do olho na senha */
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { width: 100%; padding: 12px; padding-right: 45px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .password-wrapper input:focus { border-color: #EC1A7C; box-shadow: 0 0 0 2px rgba(236, 26, 124, 0.2); }
        .toggle-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--texto-med); display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; transition: 0.2s; }
        .toggle-icon:hover { color: var(--texto-high); }

        .input-padrao { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .input-padrao:focus { border-color: #EC1A7C; box-shadow: 0 0 0 2px rgba(236, 26, 124, 0.2); }
        .input-padrao[readonly] { background-color: rgba(255, 255, 255, 0.05); color: var(--texto-med); cursor: not-allowed; }

        .btn-registro { background: var(--gradiente-cta); color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(78, 63, 234, 0.3); transition: 0.3s; }
        .btn-registro:active { transform: scale(0.98); }

        .footer-links { text-align: center; margin-top: 20px; }
        .link { color: var(--texto-med); font-size: 13px; text-decoration: none; display: block; margin-bottom: 8px; }
        .link b { color: #4E3FEA; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10B981; color: white; padding: 12px 25px; border-radius: 50px; font-size: 13px; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="auth-card">
        <div class="header">
            <h1>BLACK<span>ROCK</span></h1>
            <p class="logo-sub">GESTÃO de ATIVOS</p>
            <p>CRIAR CONTA</p>
        </div>

        <div class="input-group">
            <label>Seu Nome Completo</label>
            <input type="text" id="regNome" class="input-padrao" placeholder="Nome para o terminal">
        </div>

        <div class="input-group">
            <label>Número de Telefone</label>
            <div class="phone-wrapper">
                <div class="prefixo">🇲🇿 +258</div>
                <input type="tel" id="regTel" placeholder="Ex: 840000000">
            </div>
        </div>

        <div class="input-group">
            <label>Definir Chave (Letras e Números)</label>
            <div class="password-wrapper">
                <input type="password" id="regSenha" placeholder="Mínimo 6 caracteres">
                <div class="toggle-icon" onclick="toggleSenha('regSenha', this)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Confirmar Chave</label>
            <div class="password-wrapper">
                <input type="password" id="regSenhaConfirma" placeholder="Repita a senha">
                <div class="toggle-icon" onclick="toggleSenha('regSenhaConfirma', this)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Código de Convite (Opcional)</label>
            <input type="text" id="regConvite" class="input-padrao" placeholder="Se possuir, digite aqui">
        </div>

        <button class="btn-registro" onclick="executarRegistro()">FINALIZAR REGISTRO</button>

        <div class="footer-links">
            <a href="index.html" class="link">Voltar para o Início</a>
            <a href="login.html" class="link">Já possui acesso? <b>ENTRAR</b></a>
        </div>
    </div>

    <script>
        const URL_BASE = 'https://blackrock-gest-o.onrender.com';

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const codigoConviteDaURL = params.get('convite');
            
            if (codigoConviteDaURL) {
                const inputConvite = document.getElementById('regConvite');
                inputConvite.value = codigoConviteDaURL;
                inputConvite.readOnly = true;
                inputConvite.style.borderColor = "#EC1A7C";
            }
        };

        function toggleSenha(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                element.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            } else {
                input.type = 'password';
                element.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            }
        }

        function mostrarNotificacao(msg, cor = '#FF4B4B') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = cor;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        async function executarRegistro() {
            const btn = document.querySelector('.btn-registro');
            const originalText = btn.innerText;

            const nome = document.getElementById('regNome').value;
            const telefone = document.getElementById('regTel').value;
            const senha = document.getElementById('regSenha').value;
            const senhaConfirma = document.getElementById('regSenhaConfirma').value;
            const convite = document.getElementById('regConvite').value;

            if (senha !== senhaConfirma) {
                mostrarNotificacao("As senhas não coincidem. Verifique a digitação.");
                return;
            }

            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            const payload = { nome, telefone, senha, codigoConvite: convite };

            try {
                const res = await fetch(`${URL_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const dados = await res.json();

                if (dados.mensagem) {
                    mostrarNotificacao("Conta criada com sucesso!", '#10B981');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    mostrarNotificacao(dados.erro);
                }
            } catch (e) {
                mostrarNotificacao("Erro de conexão.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
